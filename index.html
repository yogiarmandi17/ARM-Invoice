<!doctype html>
<html lang="id">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes" />
        <link rel="icon" href="images.png" />
        <title>Form Invoice ARM Store</title>
        <!-- html2canvas dan jspdf -->
        <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
        <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
        <!-- Font Awesome 6 -->
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" />
        <link rel="stylesheet" href="style.css" />
    </head>
    <body>
        <div class="app-container">
            <!-- Form Panel -->
            <div class="form-panel">
                <h2><i class="fas fa-file-invoice"></i> Data Invoice</h2>
                <div class="form-group">
                    <label>No. Invoice</label>
                    <input type="text" id="invoiceNumber" placeholder="Masukan No Invoice Contoh : INV-1-ARM-1-2026" value="INV-1-ARM-1-2026" />
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>Nama Customer</label>
                        <input type="text" id="customerName" placeholder="Masukan Nama pelanggan" value="" />
                    </div>
                    <div class="form-group">
                        <label>Tanggal Invoice</label>
                        <input type="date" id="invoiceDate" value="" />
                    </div>
                </div>
                <div class="form-group">
                    <label>Catatan / Note</label>
                    <textarea id="invoiceNote" placeholder="Masukan Service atau Pembelian"></textarea>
                </div>

                <div class="items-section">
                    <h3><i class="fas fa-list-ul"></i> Daftar Item / Jasa</h3>
                    <div id="itemsContainer"></div>
                    <button type="button" class="add-item-btn" id="addItemBtn"><i class="fas fa-plus-circle"></i> Tambah Baris Item</button>
                </div>
                <button class="btn-convert" id="convertToPDFBtn"><i class="fas fa-download"></i> Simpan sebagai PDF</button>
                <p style="font-size: 0.7rem; margin-top: 12px; text-align: center; color: #4b5563"><i class="fas fa-print"></i> Preview di samping, klik tombol untuk download PDF (hasil sama persis)</p>
            </div>

            <!-- Preview Panel Invoice -->
            <div class="invoice-panel">
                <div class="invoice-card">
                    <h2><i class="fas fa-receipt"></i> Pratinjau Invoice</h2>
                    <div id="invoicePreviewContainer" class="invoice-preview-wrapper">
                        <div id="invoiceForPDF" class="invoice-content">
                            <!-- Konten invoice akan diisi oleh JavaScript -->
                        </div>
                    </div>
                </div>
            </div>
        </div>

            // Fungsi untuk mengkonversi SVG ke data URL
            function getLogoDataURL() {
                if (logoBase64.startsWith('<?xml') || logoBase64.startsWith('<svg')) {
                    return 'data:image/svg+xml;utf8,' + encodeURIComponent(logoBase64);
                }
                return logoBase64;
            }

            const itemsContainer = document.getElementById('itemsContainer');
            const addItemBtn = document.getElementById('addItemBtn');

            // Helper format Rupiah
            function formatRupiah(amount) {
                if (isNaN(amount) || amount === undefined || amount === null) amount = 0;
                return 'Rp ' + Math.round(amount).toLocaleString('id-ID');
            }

            // Hitung total keseluruhan
            function computeGrandTotal() {
                return itemsArray.reduce((sum, item) => sum + (item.total || 0), 0);
            }

            // Escape HTML
            function escapeHtml(str) {
                if (!str) return '';
                return str.replace(/[&<>]/g, function (m) {
                    if (m === '&') return '&amp;';
                    if (m === '<') return '&lt;';
                    if (m === '>') return '&gt;';
                    return m;
                });
            }

            // Format tanggal Indonesia
            function formatDate(dateString) {
                if (!dateString) return 'Belum diisi';
                const date = new Date(dateString);
                if (isNaN(date.getTime())) return 'Tanggal tidak valid';
                return date.toLocaleDateString('id-ID', { year: 'numeric', month: 'long', day: 'numeric' });
            }

            // Fungsi untuk merender invoice
            function renderInvoiceToPreview() {
                const invoiceDiv = document.getElementById('invoiceForPDF');
                if (!invoiceDiv) return;

                // Ambil data dari form
                const invNumber = document.getElementById('invoiceNumber').value || '-';
                const custName = document.getElementById('customerName').value || '-';
                const invDateRaw = document.getElementById('invoiceDate').value;
                const formattedDate = formatDate(invDateRaw);
                const noteText = document.getElementById('invoiceNote').value || '-';
                const grandTotal = computeGrandTotal();

                // Generate baris tabel items
                let tableRows = '';
                if (itemsArray.length === 0) {
                    tableRows = '<tr><td colspan="4" style="text-align:center; padding:30px;">Tidak ada item</td></tr>';
                } else {
                    itemsArray.forEach((item) => {
                        const itemName = item.name && item.name.trim() !== '' ? item.name : '-';
                        const qty = item.quantity || 0;
                        const price = item.price || 0;
                        const total = item.total || 0;
                        tableRows += `
                                    <tr>
                                        <td style="padding: 10px 8px;">${escapeHtml(itemName)}</td>
                                        <td style="text-align: center; padding: 10px 8px;">${qty}</td>
                                        <td style="text-align: right; padding: 10px 8px;">${formatRupiah(price)}</td>
                                        <td style="text-align: right; padding: 10px 8px; font-weight:500;">${formatRupiah(total)}</td>
                                    </tr>
                                `;
                    });
                }

                // HTML invoice lengkap dengan logo
                const invoiceHTML = `

                                    </div>
                                    <div style="flex: 1; text-align: right;">

                                        <p style="font-size: 10px; color: #6c757d; margin: 5px 0 0 0;">Kpl Jaya Mekar, Jalan Bbs No.05, RT.1/RW.8, Desa Cipatik, Cihampelas. Kab.Bandung Barat, Jawa Barat ID 40562</p>
                                    </div>
                                </div>

                                    <div class="invoice-title">
                                        <h3>INVOICE</h3>
                                        <p># ${escapeHtml(invNumber)}</p>
                                    </div>

                                        <p><span class="badge-invoice"><i class="far fa-calendar-alt"></i> ${formattedDate}</span></p>
                                    </div>
                                </div>

                                        <p><span class="label">Customer:</span> ${escapeHtml(custName)}</p>

                                    <div class="customer-info">

            // Render form items
            function renderItemsForm() {
                if (!itemsContainer) return;
                itemsContainer.innerHTML = '';

                if (itemsArray.length === 0) {
                    itemsArray.push({ name: '', quantity: 0, price: 0, total: 0 });
                }

                itemsArray.forEach((item, idx) => {
                    const rowDiv = document.createElement('div');
                    rowDiv.className = 'item-row';

                    const nameInput = document.createElement('input');
                    nameInput.type = 'text';
                    nameInput.placeholder = 'Nama item';
                    nameInput.value = item.name;
                    nameInput.className = 'item-name';
                    nameInput.style.borderRadius = '40px';
                    nameInput.style.padding = '8px 12px';
                    nameInput.style.border = '1px solid #cbd5e1';

                    const qtyInput = document.createElement('input');
                    qtyInput.type = 'number';
                    qtyInput.placeholder = 'Qty';
                    qtyInput.value = item.quantity;
                    qtyInput.className = 'item-qty';
                    qtyInput.style.borderRadius = '40px';
                    qtyInput.style.padding = '8px 12px';

                    const priceInput = document.createElement('input');
                    priceInput.type = 'number';
                    priceInput.placeholder = 'Harga';
                    priceInput.value = item.price;
                    priceInput.className = 'item-price';
                    priceInput.style.borderRadius = '40px';
                    priceInput.style.padding = '8px 12px';

                    const totalSpan = document.createElement('span');
                    const computedTotal = (Number(qtyInput.value) || 0) * (Number(priceInput.value) || 0);
                    totalSpan.innerText = formatRupiah(computedTotal);
                    totalSpan.className = 'item-total-display';

                    const removeBtn = document.createElement('button');
                    removeBtn.innerHTML = '<i class="fas fa-trash-alt"></i>';
                    removeBtn.className = 'remove-item';

                    const updateItem = () => {
                        const newName = nameInput.value;
                        const newQty = parseInt(qtyInput.value) || 0;
                        const newPrice = parseFloat(priceInput.value) || 0;
                        const newTotal = newQty * newPrice;
                        itemsArray[idx] = {
                            name: newName,
                            quantity: newQty,
                            price: newPrice,
                            total: newTotal,
                        };
                        totalSpan.innerText = formatRupiah(newTotal);
                        renderInvoiceToPreview();
                    };

                    nameInput.addEventListener('input', updateItem);
                    qtyInput.addEventListener('input', updateItem);
                    priceInput.addEventListener('input', updateItem);

                    removeBtn.addEventListener('click', () => {
                        if (itemsArray.length > 1) {
                            itemsArray.splice(idx, 1);
                            renderItemsForm();
                            renderInvoiceToPreview();
                        } else {
                            alert('Minimal harus ada satu item dalam invoice');
                        }
                    });

                    rowDiv.appendChild(nameInput);
                    rowDiv.appendChild(qtyInput);
                    rowDiv.appendChild(priceInput);
                    rowDiv.appendChild(totalSpan);
                    rowDiv.appendChild(removeBtn);
                    itemsContainer.appendChild(rowDiv);
                });
            }

            // Konversi ke PDF
            async function convertToPDF() {
                const btn = document.getElementById('convertToPDFBtn');
                const originalText = btn.innerHTML;

                btn.innerHTML = '<i class="fas fa-spinner fa-pulse"></i> Memproses PDF...';
                btn.disabled = true;

                try {
                    renderInvoiceToPreview();
                    await new Promise((resolve) => setTimeout(resolve, 200));

                    const invoiceElement = document.getElementById('invoiceForPDF');
                    if (!invoiceElement) {
                        throw new Error('Elemen invoice tidak ditemukan');
                    }

                    const canvas = await html2canvas(invoiceElement, {
                        scale: 3,
                        backgroundColor: '#ffffff',
                        logging: false,
                        useCORS: false,
                        allowTaint: false,
                    });

                    const imgData = canvas.toDataURL('image/png');
                    const { jsPDF } = window.jspdf;

                    const pdf = new jsPDF({
                        orientation: 'portrait',
                        unit: 'mm',
                        format: 'a4',
                    });

                    const pdfWidth = pdf.internal.pageSize.getWidth();
                    const pdfHeight = pdf.internal.pageSize.getHeight();
                    const imgWidth = pdfWidth;
                    const imgHeight = (canvas.height * imgWidth) / canvas.width;

                    let position = 0;
                    let heightLeft = imgHeight;

                    pdf.addImage(imgData, 'PNG', 0, position, imgWidth, imgHeight, undefined, 'FAST');
                    heightLeft -= pdfHeight;

                    while (heightLeft > 0) {
                        position = heightLeft - imgHeight;
                        pdf.addPage();
                        pdf.addImage(imgData, 'PNG', 0, position, imgWidth, imgHeight, undefined, 'FAST');
                        heightLeft -= pdfHeight;
                    }

                    const invoiceNumber = document.getElementById('invoiceNumber').value.replace(/[^a-z0-9]/gi, '_') || 'invoice';
                    pdf.save(`Invoice_${invoiceNumber}.pdf`);

                    btn.innerHTML = originalText;
                    btn.disabled = false;
                } catch (error) {
                    console.error('Error:', error);
                    alert('Terjadi kesalahan: ' + error.message);
                    btn.innerHTML = originalText;
                    btn.disabled = false;
                }
            }

            // Event binding
            function bindMainFormEvents() {
                const fields = ['invoiceNumber', 'customerName', 'invoiceDate', 'invoiceNote'];
                fields.forEach((id) => {
                    const el = document.getElementById(id);
                    if (el) el.addEventListener('input', () => renderInvoiceToPreview());
                });
            }

            // Inisialisasi
            function init() {
                renderItemsForm();
                bindMainFormEvents();
                renderInvoiceToPreview();

                if (addItemBtn) {
                    addItemBtn.addEventListener('click', () => {
                        itemsArray.push({ name: '', quantity: 0, price: 0, total: 0 });
                        renderItemsForm();
                        renderInvoiceToPreview();
                    });
                }

                const pdfBtn = document.getElementById('convertToPDFBtn');
                if (pdfBtn) pdfBtn.addEventListener('click', convertToPDF);
            }

            init();
        </script>
